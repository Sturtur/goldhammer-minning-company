<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMC Internal Archive</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="warning-screen">

        <div class="warning-box">

            <div class="warning-header">
                GMC INTERNAL NETWORK
            </div>

            <h1>ACCESO RESTRINGIDO</h1>

            <p>
                Este sistema contiene documentación interna propiedad de la GMC.
            </p>

            <p>
                El acceso está limitado a personal autorizado con nivel de autorización adecuado.
            </p>

            <p>
                Toda actividad dentro del sistema podrá ser registrada y auditada.
            </p>

            <button onclick="authorize()">
                AUTORIZAR ACCESO
            </button>

        </div>

    </div>

    <div id="terminal-screen">

        <div class="terminal-header">
            GMC SECURE ARCHIVE v3.17
        </div>

        <pre id="terminal-output"></pre>

    </div>

    <script src="script.js"></script>

</body>

</html>
